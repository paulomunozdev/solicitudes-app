name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/Functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Functions
        run: |
          dotnet publish src/Functions/Functions.csproj \
            -c Release -o ./publish/functions

      - name: Zip publish output
        run: |
          cd ./publish/functions
          zip -r ../../deploy-functions.zip .

      - name: Deploy to Azure Functions via curl
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}
        run: |
          USER=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userName=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          PWD=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userPWD=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          URL=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*publishUrl=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          echo "Deploying to $URL"
          curl -X POST \
            --user "$USER:$PWD" \
            --data-binary @./deploy-functions.zip \
            "https://$URL/api/zipdeploy?isAsync=true" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail
