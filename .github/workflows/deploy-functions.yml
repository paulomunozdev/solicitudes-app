name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/Functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Functions
        run: |
          dotnet publish src/Functions/Functions.csproj \
            -c Release -o ./publish/functions

      - name: Zip publish output
        run: |
          cd ./publish/functions
          zip -r ../../deploy-functions.zip .

      - name: Deploy to Azure Functions
        run: |
          curl -X POST \
            --user "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PWD }}" \
            --data-binary @./deploy-functions.zip \
            "https://func-solicitudesapp.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail
