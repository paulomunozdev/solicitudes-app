name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: |
          dotnet publish src/API/API.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o ./publish/api

      - name: Zip publish output
        run: |
          cd ./publish/api
          zip -r ../../deploy-api.zip .

      - name: Deploy to Azure App Service via curl
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        run: |
          # Extraer credenciales del publish profile XML
          USER=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userName=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          PWD=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userPWD=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          URL=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*publishUrl=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          echo "Deploying to $URL"
          curl -X POST \
            --user "$USER:$PWD" \
            --data-binary @./deploy-api.zip \
            "https://$URL/api/publish?type=zip" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail
