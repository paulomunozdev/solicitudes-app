name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: |
          dotnet publish src/API/API.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o ./publish/api

      - name: Zip publish output
        run: |
          cd ./publish/api
          zip -r ../../deploy-api.zip .

      - name: Deploy to Azure App Service
        run: |
          curl -X POST \
            --user "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PWD }}" \
            --data-binary @./deploy-api.zip \
            "https://api-solicitudesapp-dyd2f7gcb2b6fva4.scm.brazilsouth-01.azurewebsites.net/api/publish?type=zip" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail
