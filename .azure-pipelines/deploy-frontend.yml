trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    displayName: Setup Node 20
    inputs:
      versionSpec: 20.x

  - script: npm ci --legacy-peer-deps
    displayName: Install dependencies
    workingDirectory: frontend

  - script: npm run build -- --configuration production
    displayName: Build Angular
    workingDirectory: frontend

  - task: AzureStaticWebApp@0
    displayName: Deploy to Azure Static Web Apps
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_TOKEN)
      app_location: frontend/dist/frontend/browser
      skip_app_build: true
